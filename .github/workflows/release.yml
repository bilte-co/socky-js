name: release
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      - run: aube ci
      - run: aubr build
      - run: aubr typecheck
      - run: aube run --if-present test

      - name: Verify publish contents
        run: |
          npm pack --dry-run --silent | tail -n +1
          tarball="$(npm pack --silent)"
          echo "Tarball: $tarball"
          tar -tf "$tarball" | sort

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # Call the changeset binary directly. Going through `aube exec`
          # hits aube's lifecycle-script jail, which doesn't expose the
          # mise shims dir. Calling the bin directly sidesteps that.
          # With only aube-lock.yaml in the repo, changesets'
          # package-manager-detector won't see pnpm and will fall back
          # to spawning `npm publish` internally, which is what we want.
          publish: ./node_modules/.bin/changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
