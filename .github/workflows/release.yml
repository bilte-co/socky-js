name: release
on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          registry-url: 'https://registry.npmjs.org'

      - uses: jdx/mise-action@v2
        with:
          experimental: true

      # Install pnpm onto the runner PATH so changesets' publish step
      # (which spawns `pnpm publish` directly when it sees pnpm-lock.yaml)
      # can find it. aube exec runs commands in a lifecycle-script jail
      # that doesn't expose the mise shims dir, so we need pnpm in a
      # globally visible location.
      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - run: aube ci
      - run: aubr build
      - run: aubr typecheck
      - run: aube run --if-present test

      - name: Verify publish contents
        run: |
          npm pack --dry-run --silent | tail -n +1
          tarball="$(npm pack --silent)"
          echo "Tarball: $tarball"
          tar -tf "$tarball" | sort

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # Invoke changeset directly via pnpm so we bypass aube's
          # lifecycle-script jail entirely.
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
